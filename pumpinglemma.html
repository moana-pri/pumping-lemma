<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pumping Lemma — Demo Version</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
  <div class="nav-logo">⊢ Pumping Lemma Demo</div>
  <div class="nav-tab active">Visualizer</div>
</nav>

<div class="page active">
<div class="section-wrap">
  <div class="section-head">
    <h2> Pumping Lemma Visualizer</h2>
    <p></p>
  </div>

  <div style="background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:20px;">
    <div class="ctrl-grid" style="margin-bottom:14px;">
      <div class="ctrl-field">
        <label>Language L 5 Languages</label>
        <select id="pLang">
          <option value="firstlanguage" selected>L₁: aⁿbⁿ (n ≥ 0) </option>
          <option value="twolanguage">L₂: 0ⁿ1ⁿ (n ≥ 0) </option>
          <option value="threelanguage">L₃: aⁿbⁿcⁿ (n ≥ 0) </option>
          <option value="fourlanguage">L₆: a* </option>
          <option value="fivelanguage">L₇: (a|b)* </option>
        </select>
      </div>
      <div class="ctrl-field">
        <label>Pumping Length p</label>
        <input type="number" id="pP" value="3" min="1" max="10">
      </div>
      <div class="ctrl-field">
        <label>Input String s</label>
        <input type="text" id="pStr" value="aaabbb">
      </div>
      <div style="display:flex;align-items:flex-end;gap:8px;">
        <button class="btn btn-cyan" style="flex:1" onclick="pRun()">▶ Analyze</button>
      </div>
    </div>
    <div class="err" id="pErr"></div>
  </div>

  <div id="pMain" style="display:none">
    <div id="pBanner" class="banner"></div>

    <div class="pump-layout">
      <div class="pump-main">

        <div class="panel">
          <div class="panel-head">Decomposition s = x · y · z</div>
          <div class="panel-body">
            <div class="legend" style="margin-bottom:12px">
              <div class="leg"><div class="ld" style="background:var(--cyan)"></div>x (prefix)</div>
              <div class="leg"><div class="ld" style="background:var(--violet)"></div>y (pump region)</div>
              <div class="leg"><div class="ld" style="background:var(--emerald)"></div>z (suffix)</div>
            </div>
            <div class="str-wrap" id="pBlocks"></div>
            <div id="pChips" style="display:flex;gap:8px;flex-wrap:wrap;margin-top:14px;max-width:100%;"></div>
          </div>
        </div>

        <div class="panel">
          <div class="panel-head">Pump — xy<sup>i</sup>z</div>
          <div class="panel-body">
            <div style="margin-bottom:12px">
              <span style="font-size:12px;color:var(--text);opacity:0.8;font-family:'Fira Code',monospace;margin-right:10px;">i =</span>
              <div class="i-row" id="iBtns" style="display:inline-flex;margin:0"></div>
            </div>
            <div class="pump-disp" id="pPumpDisp" data-lbl="PUMPED STRING xy^i·z"></div>
            <div id="pStatus" style="margin-top:12px"></div>
          </div>
        </div>

      </div>

      <div class="pump-side">
        <div class="panel">
          <div class="panel-head">📖 Step-by-Step Explanation</div>
          <div class="panel-body">
            <div id="stepDisplay" style="min-height:180px;"></div>
            <div style="display:flex;justify-content:space-between;align-items:center;margin-top:16px;padding-top:16px;border-top:1px solid var(--border);">
              <button class="btn" id="prevStepBtn" onclick="prevStep()" style="padding:8px 16px;font-size:13px;">← Prev</button>
              <div id="stepCounter" style="font-family:'Fira Code',monospace;font-size:12px;color:var(--text);opacity:0.8;">Step 1 of 9</div>
              <button class="btn btn-cyan" id="nextStepBtn" onclick="nextStep()" style="padding:8px 16px;font-size:13px;">Next →</button>
            </div>
          </div>
        </div>
        
        <div class="panel">
          <div class="panel-head">Language Info</div>
          <div class="panel-body">
            <div id="pLangInfo" style="font-size:13px;line-height:1.7;margin-bottom:16px;"></div>
          </div>
        </div>
        <div class="panel">
          <div class="panel-head">Summary</div>
          <div class="panel-body">
            <div id="pExplain" class="explain-box" style="background:transparent;border:none;padding:0;font-size:12px;white-space:pre-line;"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

</div>
</div>

<script src="script.js"></script>
</body>
</html>
